<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Div & Span Example</title>
</head>
<body>
<div class="user-card" style="background-color: lightblue; padding: 10px;">
<h2>This is a heading inside the div</h2>
<p>This is a paragraph inside the same div.</p>
</div>
<div style="border: 2px solid gray; padding: 10px;">
<p>Hello,<span style="color: Orange;">this part is orange</span>, and the rest is normal</p>
</div>
</body>
</html>
