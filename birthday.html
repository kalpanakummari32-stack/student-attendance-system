<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday!</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      overflow: hidden;
      font-family: 'Comic Sans MS', cursive, sans-serif;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 2.5rem;
      color: #ff4081;
      margin: 0;
    }

    p {
      font-size: 1.2rem;
      color: #333;
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      background: gold;
      top: -10px;
      animation: fall 5s linear infinite;
      border-radius: 50%;
    }

    @keyframes fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    .balloon {
      width: 60px;
      height: 80px;
      background: red;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      position: absolute;
      bottom: -150px;
      animation: float 6s ease-in-out infinite;
    }

    .balloon::after {
      content: '';
      width: 2px;
      height: 100px;
      background: #444;
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
    }

    @keyframes float {
      0% { bottom: -150px; transform: translateX(0); }
      50% { bottom: 50%; transform: translateX(50px); }
      100% { bottom: 100vh; transform: translateX(-50px); }
    }

    .hidden-message {
      display: none;
      font-size: 1.5rem;
      color: #4CAF50;
      margin-top: 20px;
      animation: fadeIn 2s ease forwards;
    }

    input[type="checkbox"]:checked ~ .hidden-message {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎉 Happy Birthday! 🎂</h1>
    <p>Wishing you joy, laughter, and lots of cake!</p>
    <label>
      <input type="checkbox">
      <span>Click me for a surprise 🎁</span>
    </label>
    <div class="hidden-message">✨ You are amazing – enjoy your special day! have a greate day ✨</div>
  </div>

  <!-- Confetti -->
  <div class="confetti" style="left:10%; animation-delay:0s;"></div>
  <div class="confetti" style="left:30%; animation-delay:1s; background:pink;"></div>
  <div class="confetti" style="left:50%; animation-delay:2s; background:lightblue;"></div>
  <div class="confetti" style="left:70%; animation-delay:3s; background:lime;"></div>
  <div class="confetti" style="left:90%; animation-delay:4s; background:orange;"></div>

  <!-- Balloons -->
  <div class="balloon" style="left:20%; background:skyblue; animation-delay:0s;"></div>
  <div class="balloon" style="left:60%; background:violet; animation-delay:2s;"></div>
  <div class="balloon" style="left:80%; background:yellow; animation-delay:4s;"></div>
  <div class="balloon" style="left:80%; background:rgb(19, 19, 10); animation-delay:4s;"></div>
  <div class="balloon" style="left:80%; background:rgb(0, 187, 255); animation-delay:4s;"></div>
  <div class="balloon" style="left:80%; background:rgb(255, 98, 0); animation-delay:4s;"></div>
  <div class="balloon" style="left:80%; background:rgb(101, 28, 184); animation-delay:4s;"></div>
</body>
</html>
