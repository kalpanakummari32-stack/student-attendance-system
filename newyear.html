<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy New Year</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .card {
            background: #ffffff;
            width: 350px;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .card h1 {
            color: #e63946;
            font-size: 36px;
            margin-bottom: 10px;
        }

        .card h2 {
            color: #1d3557;
            margin-bottom: 20px;
        }

        .card p {
            color: #333;
            font-size: 16px;
            line-height: 1.6;
        }

        .year {
            font-size: 48px;
            font-weight: bold;
            color: #457b9d;
            margin: 20px 0;
        }

        .footer {
            margin-top: 20px;
            font-size: 14px;
            color: #777;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🎉 Happy New Year 🎉</h1>
        <div class="year">2026</div>
        <h2>Warm Wishes!</h2>
        <p>
            May the New Year bring you happiness, success, good health,
            and new opportunities. May all your dreams come true!
        </p>
        <div class="footer">
            — Best Wishes —
        </div>
    </div>

</body>
</html>
