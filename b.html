<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday!</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-family: 'Comic Sans MS', cursive, sans-serif;
    }

    h1 {
      font-size: 3rem;
      color: white;
      text-shadow: 2px 2px 10px #000;
      margin: 20px 0;
    }

    button {
      padding: 15px 25px;
      font-size: 1.2rem;
      border: none;
      border-radius: 10px;
      background: #ff4081;
      color: white;
      cursor: pointer;
      box-shadow: 0 5px 10px rgba(0,0,0,0.3);
      transition: transform 0.2s;
      margin-bottom: 20px;
    }
    button:hover {
      transform: scale(1.1);
    }

    /* Confetti */
    .confetti {
      position: absolute;
      width: 10px;
      height: 20px;
      opacity: 0.8;
      animation: fall linear forwards;
    }
    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
      }
    }

    /* Balloons */
    .balloon {
      position: absolute;
      bottom: -100px;
      width: 60px;
      height: 80px;
      border-radius: 50%;
      background: red;
      animation: float 6s linear infinite;
    }
    @keyframes float {
      0% { transform: translateY(0); }
      100% { transform: translateY(-110vh); }
    }

    /* Cake */
    .cake {
      position: relative;
      width: 200px;
      height: 100px;
      background: #8B4513;
      border-radius: 0 0 20px 20px;
      margin-top: 30px;
    }
    .icing {
      width: 200px;
      height: 30px;
      background: pink;
      border-radius: 20px 20px 0 0;
      position: absolute;
      top: -30px;
    }
    .candle {
      width: 10px;
      height: 40px;
      background: yellow;
      position: absolute;
      top: -70px;
      border-radius: 3px;
    }
    .flame {
      width: 15px;
      height: 15px;
      background: orange;
      border-radius: 50%;
      position: absolute;
      top: -15px;
      left: -2px;
      animation: flicker 0.3s infinite alternate;
    }
    @keyframes flicker {
      from { transform: scale(1); opacity: 1; }
      to { transform: scale(1.3); opacity: 0.8; }
    }

    /* Gift Box */
    .gift {
      width: 100px;
      height: 100px;
      background: red;
      position: relative;
      margin-top: 30px;
      cursor: pointer;
      animation: shake 2s infinite;
    }
    .gift::before, .gift::after {
      content: "";
      position: absolute;
      background: gold;
    }
    .gift::before {
      width: 20px;
      height: 100%;
      left: 40px;
    }
    .gift::after {
      height: 20px;
      width: 100%;
      top: 40px;
    }
    @keyframes shake {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(3deg); }
      50% { transform: rotate(-3deg); }
      75% { transform: rotate(2deg); }
    }
  </style>
</head>
<body>
  <h1>🎂 Happy Birthday 🎉</h1>
  <button onclick="startParty()">Start the Surprise!</button>

  <!-- Cake -->
  <div class="cake">
    <div class="icing"></div>
    <div class="candle" style="left:60px"><div class="flame"></div></div>
    <div class="candle" style="left:120px"><div class="flame"></div></div>
  </div>

  <!-- Gift -->
  <div class="gift" onclick="openGift()"></div>

  <audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

  <script>
    function startParty() {
      // Play music
      document.getElementById("music").play();

      // Confetti
      for (let i = 0; i < 100; i++) {
        let confetti = document.createElement("div");
        confetti.classList.add("confetti");
        document.body.appendChild(confetti);

        confetti.style.left = Math.random() * window.innerWidth + "px";
        confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
        confetti.style.animationDuration = (Math.random() * 3 + 2) + "s";

        setTimeout(() => confetti.remove(), 5000);
      }

      // Balloons
      for (let i = 0; i < 10; i++) {
        let balloon = document.createElement("div");
        balloon.classList.add("balloon");
        balloon.style.left = Math.random() * window.innerWidth + "px";
        balloon.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
        balloon.style.animationDuration = (Math.random() * 5 + 5) + "s";
        document.body.appendChild(balloon);

        setTimeout(() => balloon.remove(), 7000);
      }
    }

    // Blow out candles
    document.querySelectorAll(".flame").forEach(f => {
      f.addEventListener("click", () => {
        f.style.display = "none";
      });
    });

    // Gift box
    function openGift() {
      alert("🎁 Surprise inside! Wishing you lots of love, joy, and happiness 💖");
    }
  </script>
</body>
</html>
